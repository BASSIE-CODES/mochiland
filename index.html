<!DOCTYPE html>
<html>
<head>
<title>Bassie’s Game World</title>

<style>
body {
    background-color: #1a1a2e;
    color: #f5c6ff;
    font-family: Arial;
    text-align: center;
    margin: 0;
}

h1 {
    background-color: #2e1a47;
    color: #ff9de2;
    padding: 15px;
}

.tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.tab-button {
    background: #ff9de2;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 10px;
}

.tab-button:hover {
    background: #ff6fd8;
}

.section {
    display: none;
    padding: 10px;
}

.active {
    display: block;
}

.game-box {
    background-color: #2b2b3c;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    width: 70%;
}

button {
    background-color: #ff9de2;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #ff6fd8;
}

.affordable { background-color: #4CAF50 !important; }
.locked { background-color: #555 !important; cursor: not-allowed; }
</style>
</head>

<body>

<h1>🎀 Bassie’s Game World 🎀</h1>

<div class="tabs">
    <button class="tab-button" onclick="openTab('games')">Games</button>
    <button class="tab-button" onclick="openTab('clicker')">Clicker</button>
    <button class="tab-button" onclick="openTab('tutorials')">Tutorials</button>
    <button class="tab-button" onclick="openTab('leaderboard')">Leaderboard</button>
</div>

<!-- GAMES -->
<div id="games" class="section active">
    <div class="game-box">
        <h2>Slope</h2>
        <a href="https://geometryboss.com/games/slope/" target="_blank"><button>Play</button></a>
    </div>

    <div class="game-box">
        <h2>Subway Surfers</h2>
        <a href="https://geometryboss.com/games/subwaysurfers/" target="_blank"><button>Play</button></a>
    </div>

    <div class="game-box">
        <h2>BitLife</h2>
        <a href="https://geometryboss.com/games/bitlife/" target="_blank"><button>Play</button></a>
    </div>
</div>

<!-- CLICKER -->
<div id="clicker" class="section">
    <div class="game-box">
        <h2>🔥 CCM Clicker</h2>

        <p id="score">Score: 0</p>
        <p id="mult">Multiplier: 1x</p>

        <button onclick="clickGame()">Click (+)</button>
        <button id="upgradeBtn" onclick="buyUpgrade()"></button>
        <button id="autoBtn" onclick="buyAuto()"></button>
        <button id="bigBtn" onclick="buyBigClick()"></button>
        <button id="multBtn" onclick="buyMultiplier()"></button>
        <button onclick="rebirth()">REBIRTH</button>
    </div>
</div>

<!-- TUTORIALS -->
<div id="tutorials" class="section">
    <div class="game-box">
        <h2>📘 Tutorials</h2>
        <p>Stuff here</p>
    </div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="section">
    <div class="game-box">
        <h2>🌍 Global Leaderboard</h2>

        <p id="playerName">You: Player</p>
        <pre id="leaderboardList">Loading...</pre>

        <button onclick="setName()">Set Username</button>
        <button onclick="submitScore()">Submit Score</button>
    </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.playerName = localStorage.getItem("playerName") || "Player";

window.setName = function(){
    let name = prompt("Enter username:");
    if(name){
        window.playerName = name;
        localStorage.setItem("playerName", name);
    }
};

window.submitScore = async function(){
    await addDoc(collection(db,"leaderboard"),{
        name: window.playerName,
        score: window.score || 0
    });
    alert("Score submitted!");
};

window.loadLeaderboard = async function(){
    const q = query(collection(db,"leaderboard"), orderBy("score","desc"), limit(5));
    const snap = await getDocs(q);

    let list = [];
    snap.forEach(doc=>{
        let d = doc.data();
        list.push(d.name + " : " + Math.floor(d.score));
    });

    document.getElementById("leaderboardList").innerText = list.join("\n");
};
</script>

<!-- YOUR GAME -->
<script>

let score = 0;
let clickPower = 1;
let autoClickers = 0;
let multiplier = 1;
let rebirths = 0;
let autoInterval;

function formatNumber(num) {
    if (num >= 1e9) return (num / 1e9).toFixed(1) + "B";
    if (num >= 1e6) return (num / 1e6).toFixed(1) + "M";
    if (num >= 1e3) return (num / 1e3).toFixed(1) + "K";
    return num;
}

function clickGame() {
    score += clickPower * multiplier;
    update();
}

function buyUpgrade() {
    let cost = 50 * (rebirths + 1);
    if (score >= cost) {
        score -= cost;
        clickPower += 1 * (rebirths + 1);
        update();
    }
}

function buyAuto() {
    let cost = 150 * (rebirths + 1);
    if (score >= cost) {
        score -= cost;
        autoClickers++;

        if (!autoInterval) {
            autoInterval = setInterval(() => {
                score += autoClickers * multiplier;
                update();
            }, 1000);
        }

        update();
    }
}

function buyBigClick() {
    let cost = 500 * (rebirths + 1);
    if (score >= cost) {
        score -= cost;
        clickPower += 5 * (rebirths + 1);
        update();
    }
}

function buyMultiplier() {
    let cost = 1000 * (rebirths + 1);
    if (score >= cost) {
        score -= cost;
        multiplier += 1;
        update();
    }
}

function rebirth() {
    if (score >= 1000000000) {
        score = 0;
        clickPower = 1;
        autoClickers = 0;
        multiplier = 1;
        rebirths++;
        update();
    }
}

function update() {
    document.getElementById("score").innerText = "Score: " + formatNumber(score);
    document.getElementById("mult").innerText =
        "Multiplier: " + multiplier + "x | Rebirths: " + rebirths;

    let upgradeCost = 50 * (rebirths + 1);
    let autoCost = 150 * (rebirths + 1);
    let bigCost = 500 * (rebirths + 1);
    let multCost = 1000 * (rebirths + 1);

    document.getElementById("upgradeBtn").innerText = "+1 Click (" + formatNumber(upgradeCost) + ")";
    document.getElementById("autoBtn").innerText = "Auto Click (" + formatNumber(autoCost) + ")";
    document.getElementById("bigBtn").innerText = "Big Click Boost (" + formatNumber(bigCost) + ")";
    document.getElementById("multBtn").innerText = "Multiplier Boost (" + formatNumber(multCost) + ")";

    if(window.loadLeaderboard){
        window.loadLeaderboard();
    }

    document.getElementById("playerName").innerText =
        "You: " + (window.playerName || "Player");
}

function openTab(tab) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}

update();

</script>

</body>
</html>
